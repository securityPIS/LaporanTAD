<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LaporanTAD">
  <defs>
    <!-- Gradien clay biru: sorotan kiri-atas → biru dalam kanan-bawah -->
    <linearGradient id="clayBg" x1="70" y1="52" x2="452" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6f92ff"/>
      <stop offset="0.52" stop-color="#4a72f0"/>
      <stop offset="1" stop-color="#2c50c4"/>
    </linearGradient>
    <linearGradient id="markGrad" x1="150" y1="180" x2="392" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbe6ff"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(150 118) rotate(52) scale(300 300)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="botShade" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(388 402) rotate(-130) scale(280 280)">
      <stop offset="0" stop-color="#1a2f7a" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#1a2f7a" stop-opacity="0"/>
    </radialGradient>
    <filter id="markShadow" x="100" y="100" width="360" height="360" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="9" stdDeviation="12" flood-color="#0c1a52" flood-opacity="0.40"/>
    </filter>
  </defs>

  <!-- Squircle clay -->
  <rect x="24" y="24" width="464" height="464" rx="132" fill="url(#clayBg)"/>
  <rect x="24" y="24" width="464" height="464" rx="132" fill="url(#topGlow)"/>
  <rect x="24" y="24" width="464" height="464" rx="132" fill="url(#botShade)"/>
  <!-- Cincin sorotan tipis (rim light) untuk kesan timbul -->
  <rect x="30" y="30" width="452" height="452" rx="126" fill="none" stroke="#ffffff" stroke-opacity="0.20" stroke-width="3"/>

  <!-- Logo Pertamina: tiga anak panah (biru, hijau, merah) menanjak ke kanan -->
  <g filter="url(#markShadow)" stroke="#ffffff" stroke-opacity="0.28" stroke-width="4" stroke-linejoin="round">
    <path d="M302 330 L152 284 L196 330 L152 376 Z" fill="#00A0E3"/>
    <path d="M342 256 L192 210 L236 256 L192 302 Z" fill="#1AA64C"/>
    <path d="M382 182 L232 136 L276 182 L232 228 Z" fill="#ED1C24"/>
  </g>
</svg>
